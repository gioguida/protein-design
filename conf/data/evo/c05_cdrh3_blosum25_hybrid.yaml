# @package _global_
# Hybrid masking on the C05-similar VH corpus. Currently used only for the
# resume-from-checkpoint verification test (small, fast, reuses the existing
# C05-scale CDR-window cache) — not yet part of the OAS masking ablation
# itself (see conf/data/evo/oas_full_hybrid.yaml for that).
data:
  fasta_path: ${paths.project_dir}/data/c05/c05_cdrh3_blosum25.fasta
  max_seq_len: 256
  mlm_probability: 0.15
  masking: hybrid
  cdr_flank: 3
  cdr_windows_cache: ${paths.scratch_dir}/cdr_windows/c05_cdrh3_blosum25_flank3.parquet
  cdr_mask_prob: 0.5
  hybrid_cdr_sample_prob: 0.8
  split:
    salt: oas-v1
    train_pct: 90
    val_pct: 5
    test_pct: 5
