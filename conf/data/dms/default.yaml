split:
  enabled: true
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1
  seed: 42
  output_dir: /cluster/project/infk/krause/${USER}/protein-design/data/dms_splits
  hamming_distance: 0
  stratify_bins: 10

datasets:
  cetuximab_h:
    # AbAgym EGFR_2013_Cetuximab, heavy-chain-only single mutants (559 rows) --
    # see scripts/data_prep/build_cetuximab_h.py and
    # data/AbAgym/CETUXIMAB_DPO_GUIDE.md. Full 220-aa VH+CH1 mutant sequences
    # (no separate CDR/context split like C05 -- mutations span all 3 heavy
    # CDRs). key_metric_col is `neg_DMS_score` = -DMS_score, since AbAgym's
    # raw DMS_score has negative=enhanced-binding (preferred); negating it
    # matches this project's convention of positive=preferred. wt_sequence is
    # the WT heavy chain (PDB 1yy9, chain H); wt_metric_value=0.0 because the
    # unmutated WT has an implicit (unmeasured) DMS_score of 0 by assay
    # construction, so no delta shift is needed on top of the sign flip.
    path: /cluster/project/infk/krause/mdenegri/protein-design/data/raw/AbAgym_cetuximab_h_mutants.csv
    sequence_col: aa
    key_metric_col: neg_DMS_score
    wt_sequence: "QVQLKQSGPGLVQPSQSLSITCTVSGFSLTNYGVHWVRQSPGKGLEWLGVIWSGGNTDYNTPFTSRLSINKDNSKSQVFFKMNSLQSNDTAIYYCARALTYYDYEFAYWGQGTLVTVSAASTKGPSVFPLAPSSKSTSGGTAALGCLVKDYFPEPVTVSWNSGALTSGVHTFPAVLQSSGLYSLSSVVTVPSSSLGTQTYICNVNHKPSNTKVDKRVEPK"
    wt_metric_value: 0.0
  ed1_m22:
    # Combined single-mutant (num_mut==1) pool from ED2_M22/ED5_M22/ED811_M22
    # raw files -- see scripts/data_prep/build_ed1_m22.py. ED2_M22 alone is a
    # complete saturation scan (24 CDR-H3 positions x 19 subs = 456 rows) and
    # is a strict superset of the ED1 rows found in the other two pools, so
    # this combined file equals ED2_M22's own ED1 rows (source_pool column
    # records provenance either way).
    path: /cluster/project/infk/krause/mdenegri/protein-design/data/raw/ED1_M22_binding_enrichment_combined.csv
    sequence_col: aa
    key_metric_col: M22_binding_enrichment_adj
  ed2_m22:
    path: /cluster/project/infk/krause/gguidarini/protein-design/data/raw/ED2_M22_binding_enrichment.csv
    sequence_col: aa
    key_metric_col: M22_binding_enrichment_adj
  ed2_si06:
    path: /cluster/project/infk/krause/gguidarini/protein-design/data/raw/ED2_SI06_binding_enrichment.csv
    sequence_col: aa
    key_metric_col: SI06_binding_enrichment_adj
    split_source: ed2_m22
  ed5_m22:
    path: /cluster/project/infk/krause/gguidarini/protein-design/data/raw/ED5_M22_binding_enrichment.csv
    sequence_col: aa
    key_metric_col: M22_binding_enrichment_adj
  ed5_si06:
    path: /cluster/project/infk/krause/gguidarini/protein-design/data/raw/ED5_SI06_binding_enrichment.csv
    sequence_col: aa
    key_metric_col: SI06_binding_enrichment_adj
    split_source: ed5_m22
  ed811_m22:
    path: /cluster/project/infk/krause/gguidarini/protein-design/data/raw/ED811_M22_enrichment_full.csv
    sequence_col: aa
    key_metric_col: M22_binding_enrichment_adj
  exp:
    path: /cluster/project/infk/krause/mdenegri/protein-design/data/dms_splits/exp/exp_enrichment.csv
    sequence_col: aa
    key_metric_col: exp_enrichment_adj
    no_split: true
