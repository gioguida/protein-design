# @package _global_
data:
  dms_config: conf/data/dms/default.yaml
  dpo_dataset_key: ed2_m22
  processed_dir: data/processed
  force_rebuild: false
  # 1-based CDR-H3 positions. If a chosen/winner sequence is mutated at any of
  # these positions relative to the WT C05 CDR-H3, that pair is removed.
  exclude_winner_mutation_positions: []
  pair_split:
    # Keep train as anchor, and cap val/test to these ratios.
    enforce_train_controlled_sizes: true
    train_frac: 0.8
    val_frac: 0.1
    test_frac: 0.1
  # Low-data regime: subsample the TRAIN SEQUENCE split to n_train before pairs
  # are derived (val/test untouched, so the held-out eval is constant across N).
  # Deterministic in (n_train, scheme, seed) -> identical sequences across base
  # models, so evo-vs-vanilla differs only by the model. Off by default; enable
  # per-run, e.g.:  data.low_data.enabled=true data.low_data.n_train=200
  low_data:
    enabled: false
    n_train: null
    scheme: stratified   # stratified (by enrichment) | random (sanity band)
    stratify_bins: 10
    seed: 0
    # Caps on the per-epoch in-loop val eval (the full ed2 val set costs hours).
    # null = no cap (legacy behavior). The final ed5 test eval is never capped.
    val_pairs_cap: null      # cap on val PAIR rows (val-loss / perplexity loop)
    val_spearman_cap: null   # cap on val Spearman sequence rows
    test_pairs_cap: null     # cap on test PAIR rows (final DPO-loss/ppl diagnostics;
                             # the reported ed5 test_spearman_avg is NOT capped)
  pairing_strategy: delta_based
  min_positive_delta: 3.0
  min_delta_margin: 5.0
  delta_based:
    components: [cross, wt_anchors, within_pos, within_neg]   #  [cross, wt_anchors, within_pos, within_neg]
    gap: 0.5
    # Legacy candidate-pool controls (applied before mix selection).
    # Keep these high to let `mix` govern final component counts.
    wt_pairs_frac: 1.0
    cross_pairs_frac: 1.0
    mix:
      mode: count   #  count | fraction
      count:
        within_pos: 10000
        within_neg: 3000
        wt_anchors: 2000
        cross: 7000
      fraction:
        within_pos: 0.2
        within_neg: 0.0
        wt_anchors: 0.2
        cross: 0.6
    strong_pos_threshold: 1.0
    strong_neg_threshold: -5.0
    min_score_margin: 0.1
  val:
    n_val_pos: 200
    n_val_neg: 400
  test:
    dataset_key: ed5_m22
    pos_threshold: 0.0
