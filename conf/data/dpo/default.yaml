# @package _global_
data:
  dms_config: conf/data/dms/default.yaml
  dpo_dataset_key: ed2_m22
  processed_dir: data/processed
  force_rebuild: false
  pairing_strategy: delta_based
  min_positive_delta: 3.0
  min_delta_margin: 5.0
  delta_based:
    components: [cross, wt_anchors]
    gap: 0.5
    wt_pairs_frac: 0.1
    cross_pairs_frac: 0.03
    strong_pos_threshold: 1.0
    strong_neg_threshold: -5.0
    min_score_margin: 0.1
  val:
    n_val_pos: 200
    n_val_neg: 400
  test:
    dataset_key: ed5_m22
    pos_threshold: 0.0
