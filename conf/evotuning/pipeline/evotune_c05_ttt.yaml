# @package _global_
# Full chain: evotuning on OAS -> C05-5k finetune -> TTT on a single CDRH3.
# Each stage seeds from the previous stage's best/final checkpoint automatically.
pipeline:
  init_from: null
  stages:
    - name: evotuning
      task: evotuning
      data: oas_full
    - name: c05_finetune
      task: evotuning_c05
      data: c05_5k
    - name: ttt
      task: ttt
      data: c05_single
