defaults:
  - evotuning/task: evotuning
  - model: esm2_35m
  - evotuning/data: oas_full
  - evotuning/scoring: d2
  - _self_

# Pipelines under conf/evotuning/pipeline/ declare one or more training stages.
# Select with `+evotuning/pipeline=<name>` (e.g. +evotuning/pipeline=evotune_c05_ttt).
pipeline: null

run_name: null
seed: 42
finetune: null

paths:
  project_dir: ${oc.env:PROJECT_DIR}
  train_dir: ${oc.env:TRAIN_DIR}

wandb:
  enabled: true
  project: ${oc.env:WANDB_PROJECT,protein-design}
  entity: null
  init_timeout: 180
  fallback_mode: offline  # offline | disable
  tags: []
  notes: null

logging:
  level: INFO
  log_every_n_steps: 50

hydra:
  job:
    chdir: false
  run:
    dir: .
