# @package _global_
# Single-mask C05 scoring: per-epoch masked-position Spearman on the ED2/M22
# validation split; the held-out test split is scored only once at end of
# training (logged as test/spearman_*). Both use score_sequences_masked_positions.
scoring:
  n_samples: 10000
  batch_size: 512
  flank_ks: [1, 3, 5]
  persist_test_scores: false
  persist_live_scores: false
  datasets:
    - name: M22_val
      path: ${paths.project_dir}/data/dms_splits/ed2_m22/val.csv
      enrichment_col: M22_binding_enrichment_adj
  final_datasets:
    - name: M22_test
      path: ${paths.project_dir}/data/dms_splits/ed2_m22/test.csv
      enrichment_col: M22_binding_enrichment_adj
