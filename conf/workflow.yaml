defaults:
  - evotuning/pipeline@selectors.evotuning.pipeline: evotuning
  - dpo/data@selectors.dpo.data: default
  - dpo/model@selectors.dpo.model: default
  - dpo/training@selectors.dpo.training: default
  - dpo/logging@selectors.dpo.logging: default
  - dpo/checkpointing@selectors.dpo.checkpointing: default
  - dpo/wandb@selectors.dpo.wandb: default
  - _self_

workflow:
  # Allowed values: evotuning, dpo
  steps: [evotuning, dpo]
  handoff:
    mode: best    # best | final | path
    path: null
  evotuning_overrides: []
  dpo_overrides: []

hydra:
  job:
    chdir: false
  run:
    dir: .
