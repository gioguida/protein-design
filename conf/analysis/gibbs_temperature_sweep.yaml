# Gibbs temperature sweep configuration
# Runs Gibbs sampling at multiple temperatures, produces per-temperature plots
# and cross-temperature summary comparisons.
#
# Usage:
#   uv run python scripts/analysis/run_gibbs_temperature_sweep.py \
#     --config conf/analysis/gibbs_temperature_sweep.yaml

sweep:
  temperatures: [0.5, 0.6, 0.7, 0.8, 0.9, 1.0, 1.5]

  # Gibbs-specific parameters
  n_chains: 15
  n_steps: 500            # sampling steps (after burn-in)
  burn_in: 200            # steps before recording
  snapshot_every: 50
  max_mutations: 8        # reject steps that exceed this edit distance from WT
  start_mode: "wt"        # wt | dms
  seed: 42

models:
  - name: "dpo_from_evo"
    checkpoint: "/cluster/project/infk/krause/mdenegri/protein-design/checkpoints/dpo__evo_base_20260425_190014"
    model_variant: "DPO from evo"

dms:
  m22_path: "/cluster/project/infk/krause/${USER}/protein-design/data/raw/ED2_M22_binding_enrichment.csv"
  si06_path: "/cluster/project/infk/krause/${USER}/protein-design/data/raw/ED2_SI06_binding_enrichment.csv"
  m22_col: "M22_binding_enrichment_adj"
  si06_col: "SI06_binding_enrichment_adj"
  max_dms: 500

# Same plot toggles as the SBS sweep - all reuse the same scripts.
# The per-temperature plots all read a CSV with columns:
#   chain_id, gibbs_step, sequence, cdrh3, n_mutations, model_variant
# which is the SAME format for both Gibbs and SBS output.
plots:
  beam_pll_trajectory: true        # routes to gibbs_diagnostics.py (works for both)
  beam_pll_vs_dms_histogram: true
  beam_diversity_diagnostics: true
  beam_pll_vs_nmut: true
  beam_aa_heatmap: true

summary:
  pll_vs_diversity_tradeoff: true
  pll_distribution_by_temp: true
  top_k_for_pll: 50

output:
  base_dir: "/cluster/project/infk/krause/${USER}/protein-design/reports/gibbs_temperature_sweep/outputs"
  plots_dir: "/cluster/project/infk/krause/${USER}/protein-design/reports/gibbs_temperature_sweep/plots"