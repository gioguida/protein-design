version: 1

run:
  force: false
  reuse_existing_artifacts: true
  plots_only: false
  dry_run: false
  cka_threshold: 0.5
  max_dms: 500
  max_oas: 2000
  max_gibbs: 200
  scratch_base: "/cluster/scratch/${USER}/protein-design/embedding_analysis"
  project_base: "/cluster/project/infk/krause/${USER}/protein-design/reports/embedding_analysis"

models:
  catalog:
    vanilla:
      display_name: "Vanilla ESM2"
      checkpoint_path: ""
    evotuned:
      display_name: "Evo-tuned"
      checkpoint_path: "/cluster/project/infk/krause/mdenegri/protein-design/checkpoints/oas_full_evo_35m/oas_full_evo_35m.pt"
    dpo_from_evo:
      display_name: "EvoDPO (5 epoch)"
      checkpoint_path: "/cluster/project/infk/krause/gguidarini/protein-design/checkpoints/dpo_linear_warmup/best.pt"
    dpo_light
      display_name: "EvoDPO (light)"
      checkpoint_path: "/cluster/project/infk/krause/gguidarini/protein-design/checkpoints/dpo_one_epoch_low_lr/best.pt"
    
  selected_models: [vanilla, evotuned, dpo_from_evo, dpo_light]

datasets:
  dms_config: conf/data/dms/default.yaml
  split_name: test
  subsample:
    enabled: true
    max_rows: 5000
    seed: 42
    output_dir: data/processed/analysis_subsamples
    stratify_bins: 10
  catalog:
    ed2:
      m22_dataset: ed2_m22
      si06_dataset: ed2_si06
    ed5:
      m22_dataset: ed5_m22
      si06_dataset: ed5_si06
    ed811:
      m22_dataset: ed811_m22
      si06_dataset: null
  oas:
    fasta_path: "/cluster/project/infk/krause/mdenegri/protein-design/datasets/oas_dedup_rep_seq.fasta"
    meta_csv_gz_path: "/cluster/project/infk/krause/mdenegri/protein-design/datasets/oas_filtered.csv.gz"

sampling:
  selected_sampling_strategies: [gibbs_dist, gibbs_fit, beam_dist, beam_fit]
  strategies:
    gibbs_dist:
      type: gibbs
      role: distribution
      generate: true
      output_csv_path: "outputs/gibbs/distribution/{model_id}.csv"
      params:
        n_chains: 15
        n_steps: 100
        snapshot_every: 10
        temperature: 1.0
        seed: 42
        start_mode: dms
        wt_cdrh3: "HMSMQQVVSAGWERADLVGDAFDV"
        dms_m22_path: "dms_split:ed2_m22:test"
        dms_si06_path: "dms_split:ed2_si06:test"
        max_dms_seeds: 500
        device: cuda
    gibbs_fit:
      type: gibbs
      role: fitness
      generate: true
      output_csv_path: "outputs/gibbs/fitness/{model_id}.csv"
      params:
        n_chains: 15
        n_steps: 100
        snapshot_every: 10
        temperature: 1.0
        seed: 42
        start_mode: wt
        wt_cdrh3: "HMSMQQVVSAGWERADLVGDAFDV"
        device: cuda
    beam_dist:
      type: beam
      role: distribution
      generate: true
      output_csv_path: "outputs/beam_search/distribution/{model_id}.csv"
      params:
        beam_size: 40
        n_steps: 5
        snapshot_every: 1
        temperature: 0.5
        seed: 42
        start_mode: dms
        wt_cdrh3: "HMSMQQVVSAGWERADLVGDAFDV"
        dms_m22_path: "dms_split:ed2_m22:test"
        dms_si06_path: "dms_split:ed2_si06:test"
        max_dms_seeds: 500
        device: cuda
    beam_fit:
      type: beam
      role: fitness
      generate: true
      output_csv_path: "outputs/beam_search/fitness/{model_id}.csv"
      params:
        beam_size: 40
        n_steps: 5
        snapshot_every: 1
        temperature: 0.5
        seed: 42
        # start_mode options: wt | dms | top_dms
        start_mode: wt
        wt_cdrh3: "HMSMQQVVSAGWERADLVGDAFDV"
        device: cuda
        # top_k_dms: 10  # only used when start_mode: top_dms

plots:
  per_model_pca:
    enabled: true
    datasets: [ed2, ed5, ed811]
    overlay_sampling: []
  gibbs_per_model_pca:
    enabled: true
    datasets: [ed2, ed5, ed811]
    overlay_sampling: [gibbs_dist, gibbs_fit]
  beam_per_model_pca:
    enabled: true
    datasets: [ed2, ed5, ed811]
    overlay_sampling: [beam_dist, beam_fit]
  diff_vectors_pca:
    enabled: false
    datasets: [ed2, ed5, ed811]
    overlay_sampling: []
  oas_umap:
    enabled: false
    datasets: []
    overlay_sampling: []
    color_modes: [germline_family, j_gene, vgene_within_family, shm_within_family, cdr3_length]
    filter_family:
      vgene_within_family: IGHV3
      shm_within_family: IGHV3
  pll_pca:
    enabled: true
    datasets: [ed2, ed5, ed811]
    overlay_sampling: []
  pll_vs_enrichment_overlays:
    enabled: true
    datasets: [ed2, ed5, ed811]
    overlay_sampling: [gibbs_dist, gibbs_fit, beam_dist, beam_fit]
    params:
      batch_size: 32
      max_overlay: 12000
      split_modes: [full, test_dpo]
      match_mode: both
      dpo_split_config: conf/data/dpo/default.yaml
      split_seed: 42

  # ----- Beam search evaluation plots (new) -----
  # These are flat boolean toggles (no enabled/datasets sub-keys).
  # DMS-dependent plots (beam_pll_vs_dms_histogram, beam_aa_heatmap) run for
  # every dataset already in the required_datasets set (those used by the
  # enabled dataset-specific plots above).
  # Non-DMS plots (beam_diversity_diagnostics, beam_pll_vs_nmut) run once per
  # model × beam strategy regardless of active datasets.

  # NOTE: beam_pll_trajectory routes to the existing gibbs_diagnostics.py,
  # which already computes exact PLL trajectories. Setting this to true adds
  # an explicit per-strategy call in addition to the existing bulk call.
  beam_pll_trajectory: false

  # Overlaid histogram: PLL of SBS final-step sequences vs DMS test sequences.
  beam_pll_vs_dms_histogram: false

  # Three-panel: pairwise Hamming, per-position Shannon entropy, n_mutations.
  beam_diversity_diagnostics: false

  # Scatter: PLL vs n_mutations (Spearman rho annotated).
  beam_pll_vs_nmut: false

  # Side-by-side 20×24 AA frequency heatmaps (SBS vs DMS).
  beam_aa_heatmap: false
