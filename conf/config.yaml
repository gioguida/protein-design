defaults:
  - _self_

seed: 42

data:
  raw_csv: data/raw/M22_binding_enrichment.csv
  processed_dir: data/processed
  force_rebuild: false
  pairing_strategy: both_structured   # positive_vs_tail | positive_only_extremes | both_structured
  min_positive_delta: 3.0
  min_delta_margin: 5.0
  include_views: [mut1, mut2]
  deduplicate_across_views: true
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1

model:
  esm_model_path: /cluster/project/krause/flohmann/mgm/oracle_assets/esm2_150m.safetensors
  use_context: true
  pll_mask_chunk_size: 16

training:
  batch_size: 32
  num_epochs: 15
  lr: 1e-5
  weight_decay: 0.0
  beta: 0.04
  grad_clip_norm: 1.0
  patience: 10
  device: cuda
  num_workers: 0
  resume_checkpoint: null
  evaluate_best_checkpoint: true
  scheduler:
    enabled: false
    step_size: 100
    gamma: 0.95

logging:
  level: INFO
  preview_count: 5
  log_every_n_steps: 20
  history_csv: history.csv

checkpointing:
  dir: checkpoints
  best_filename: best.pt
  last_filename: last.pt
  best_export_dir: ${oc.env:DPO_BEST_MODEL_DIR,null}
  best_export_filename: best.pt
  last_export_dir: ${oc.env:DPO_LAST_MODEL_DIR,null}
  last_export_filename: last.pt

output_dir: ${oc.env:DPO_OUTPUT_DIR,outputs}
wandb:
  enabled: true
  project: flu
  entity: null
  run_name: null
  tags: []
  notes: null

hydra:
  job:
    chdir: false
  run:
    dir: ${output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}_sweep
