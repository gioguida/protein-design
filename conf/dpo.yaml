defaults:
  - dpo/data: default
  - dpo/model: default
  - dpo/training: default
  - dpo/logging: default
  - dpo/checkpointing: default
  - dpo/wandb: default
  - _self_

seed: 42

run:
  base_name: null  # optional base name; final run name is <base_name>_<YYYYMMDD_HHMMSS>

output_dir: ${oc.env:TRAIN_DIR,${oc.env:DPO_OUTPUT_DIR,outputs}}

hydra:
  job:
    chdir: false
  run:
    dir: .
  sweep:
    dir: .
