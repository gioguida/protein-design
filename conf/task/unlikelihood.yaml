# @package _global_
defaults:
  - override /data: dpo/default
  - override /scoring: none
  - _self_

task:
  name: unlikelihood
  runner: unlikelihood

data:
  max_seq_len: 256
  enrichment_threshold: 5.19
  mask_fraction: 0.15
  unwanted_set_path: ${data.processed_dir}/unwanted_set.json

training:
  learning_rate: 2.0e-5
  warmup_steps: 500
  max_epochs: 15
  max_steps: null
  batch_size: 32
  gradient_accumulation_steps: 4
  save_every_n_steps: 5000
  fp16: true
  alpha: 1.0
  evaluate_best_checkpoint: true
