# @package _global_
# Variant 1 — ESM2-650M evotuning on C05-similar VH, single-mask 15% random.
defaults:
  - override /model: esm2_650m
  - override /data: evo/c05_cdrh3_blosum25_random15
  - override /scoring: c05
  - _self_

task:
  name: evotuning_c05_random
  runner: evotuning
  stage_type: evotuning

training:
  learning_rate: 5.0e-5
  warmup_steps: 50
  max_epochs: 15
  max_steps: null
  batch_size: 64
  gradient_accumulation_steps: 8
  save_every_n_steps: null
  eval_per_epoch: true
  fp16: true
