# @package _global_
defaults:
  - override /data: evo/c05_single
  - override /scoring: none
  - _self_

task:
  name: ttt_sweep
  runner: evotuning
  stage_type: ttt

model:
  freeze_lm_head: true
  lora:
    r: 8
    alpha: 16
    dropout: 0.0
    target_modules: [query, key, value]

training:
  learning_rate: 4.0e-4
  warmup_steps: 0
  max_epochs: 1
  max_steps: 100
  batch_size: 4
  gradient_accumulation_steps: 16
  save_every_n_steps: null
  fp16: false
  snapshot_steps: [5, 10, 20, 50, 100, 200]
