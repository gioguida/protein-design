# @package _global_
# Generic (model-size- and dataset-agnostic) cdrmix single-mask C05 evotuning.
#
# Same recipe as evotuning_c05_cdrmix_v2{,_35m} but selection is by val
# perplexity ONLY (best.pt), with val-ppl early stopping — no DMS/Spearman in
# the loop. Model size / init / freeze are NOT hardcoded: pass them on the CLI
# (e.g. model=esm2_35m model.init.source=huggingface model.freeze_first_n_layers=0),
# exactly like bash_scripts/sweep_evotuning_cdrmix.sh / dpo_lowdata_sweep.sh do.
#
# Dataset is the imported data default; override data.fasta_path= to swap it.
# cdr_windows_cache is intentionally left null so it auto-derives from
# (fasta_path, cdr_flank) -- sweeping cdr_flank "just works" given a built cache.
defaults:
  # NOTE: /model is deliberately not overridden here -- the sweep script passes
  # model=esm2_35m | model=esm2_650m | ... on the CLI.
  - override /data: evo/c05_cdrh3_blosum25_cdrmix
  - override /scoring: none  # sweep-time default; CLI override /scoring=c05 for confirmation runs
  - _self_

task:
  name: evotuning_cdrmix
  runner: evotuning
  stage_type: evotuning

data:
  # Leave unset so build_data_config auto-derives it from (fasta_path, cdr_flank);
  # the imported data default pins flank3, which we must clear to sweep cdr_flank.
  cdr_windows_cache: null
  split:
    train_pct: 95
    val_pct: 5
    test_pct: 0

training:
  learning_rate: 5.0e-5
  warmup_steps: 50
  max_epochs: 12
  max_steps: null
  batch_size: 64
  gradient_accumulation_steps: 8
  # ~3 evals/epoch; must be divisible by gradient_accumulation_steps (8).
  save_every_n_steps: 480
  eval_per_epoch: true
  fp16: true
  # Select by val perplexity: stop after 2 consecutive per-epoch evals without
  # any val-ppl improvement. max_epochs=12 leaves room for this to trigger.
  early_stopping_patience: 2
  early_stopping_min_delta: 0.0
