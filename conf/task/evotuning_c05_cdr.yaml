# @package _global_
# Variant 2 — ESM2-650M evotuning on C05-similar VH, single-mask CDR-H3 ± 3.
defaults:
  - override /model: esm2_650m
  - override /data: evo/c05_cdrh3_blosum25_cdrmask
  - override /scoring: c05
  - _self_

task:
  name: evotuning_c05_cdr
  runner: evotuning
  stage_type: evotuning

# Regularization against CDR-H3 overfitting: freeze the lower ESM2 layers so
# only the top blocks + head adapt (general representations are preserved).
model:
  freeze_first_n_layers: 24

training:
  learning_rate: 5.0e-5
  warmup_steps: 50
  max_epochs: 10
  max_steps: null
  batch_size: 64
  gradient_accumulation_steps: 8
  save_every_n_steps: null
  eval_per_epoch: true
  # Stop after 3 consecutive epochs without val-ppl improvement.
  early_stopping_patience: 3
  early_stopping_min_delta: 0.0
  fp16: true
