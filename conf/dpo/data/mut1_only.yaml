# @package _global_

# Variant preset: use only mut1 view when building DPO pairs.
data:
  raw_csv: data/raw/ED2_M22_binding_enrichment.csv
  processed_dir: data/processed
  force_rebuild: false
  pairing_strategy: delta_based
  min_positive_delta: 3.0
  min_delta_margin: 5.0
  delta_based:
    components: [cross, wt_anchors, within_pos, within_neg]
    gap: 0.5
    wt_pairs_frac: 0.1
    cross_pairs_frac: 0.1
    strong_pos_threshold: 1.0
    strong_neg_threshold: -5.0
    min_score_margin: 0.1
  include_views: [mut1]
  deduplicate_across_views: true
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1
  split:
    hamming_distance: 1
    stratify_bins: 10
  val:
    n_val_pos: 200
    n_val_neg: 400
  test:
    ed5_csv: data/raw/ED5_M22_enrichment.csv
    pos_threshold: 0.0
