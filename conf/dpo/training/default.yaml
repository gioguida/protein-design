# @package _global_
training:
  batch_size: 32
  num_epochs: 15
  lr: 1e-5
  weight_decay: 0.0
  loss: weighted_dpo     # dpo | weighted_dpo
  beta: 0.04
  temperature: 1         # only relevant for weighted loss
  grad_clip_norm: 1.0
  patience: 10
  device: cuda
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  resume_checkpoint: null
  evaluate_best_checkpoint: true
  scheduler:
    enabled: false
    step_size: 100
    gamma: 0.95
